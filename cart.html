<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <style>

        .cart-container { max-width: 900px; margin: 20px auto; }
        .cart-item, .cart-header, .cart-footer { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .cart-header { font-weight: bold; background-color: #f8f9fa; }
        .cart-item-info { flex: 3; }
        .cart-item-price, .cart-item-quantity, .cart-item-total { flex: 1; text-align: center; }
        .cart-item-actions { flex: 0.5; text-align: right; }
        .cart-item-quantity input { width: 60px; text-align: center; padding: 5px; }
        .cart-footer { justify-content: space-between; font-size: 1.2em; }
        .cart-empty { text-align: center; padding: 50px; font-size: 1.2em; color: #777; }
        .remove-btn, .clear-cart-btn { background-color: #6c757d; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;}
        #checkout-btn { background-color: #ff751f; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;}
         
    </style>
</head>
<body>
    <!-- Reuses navbar structure from index.html -->
    <nav class="navbar">
        <a href="index.html" class="logo"><img src="images/logo_2.png" style="height: 75px; width: 150px;"></a>
        <div class="nav-links" id="nav-links">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <main class="main-content-area">
        <div class="cart-container">
            <h1>My Cart</h1>
            <div id="cart-content">
                <!-- Cart content will be generated by JS -->
            </div>
            <div id="message"></div>
        </div>
    </main>

    <div id="footer-container">
        <!-- Footer will be populated by footer.js -->
    </div>

    <!-- Include required JS modules -->
    <script src="js/modules/api.js"></script>
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/cart.js"></script>
    <script src="js/modules/navigator.js"></script>
    <script src="js/modules/footer.js"></script>

    <script src="js/pages/cart.js"></script>
</body>
</html>
