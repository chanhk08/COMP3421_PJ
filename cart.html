<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的購物車</title>
    <link rel="stylesheet" href="css/style.css">
    <style>

        .cart-container { max-width: 900px; margin: 20px auto; }
        .cart-item, .cart-header, .cart-footer { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .cart-header { font-weight: bold; background-color: #f8f9fa; }
        .cart-item-info { flex: 3; }
        .cart-item-price, .cart-item-quantity, .cart-item-total { flex: 1; text-align: center; }
        .cart-item-actions { flex: 0.5; text-align: right; }
        .cart-item-quantity input { width: 60px; text-align: center; padding: 5px; }
        .cart-footer { justify-content: space-between; font-size: 1.2em; }
        .cart-empty { text-align: center; padding: 50px; font-size: 1.2em; color: #777; }
        .remove-btn, .clear-cart-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        
    </style>
</head>
<body>
    <!-- 沿用 index.html 的導覽列結構 -->
    <nav class="navbar">
        <a href="index.html" class="logo">我的商店</a>
        <div class="nav-links" id="nav-links">
            <a href="login.html">登入</a>
            <a href="register.html">註冊</a>
        </div>
    </nav>

    <main class="main-content-area">
        <div class="cart-container">
            <h1>我的購物車</h1>
            <div id="cart-content">
                <!-- 購物車內容將由 JS 動態生成 -->
            </div>
            <div id="message"></div>
        </div>
    </main>

    <div id="footer-container">
        <!-- 頁尾將由 footer.js 動態填充 -->
    </div>

    <!-- 引入所有必要的 JS 模組 -->
    <script src="js/modules/api.js"></script>
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/cart.js"></script>
    <script src="js/modules/navigator.js"></script>
    <script src="js/modules/footer.js"></script>

    <script src="js/pages/cart.js"></script>
</body>
</html>
