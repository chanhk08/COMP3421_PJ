<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>註冊新帳號</title>
    <link rel="stylesheet" href="css/style.css"> <!-- 假設您有通用的 CSS 檔案 -->
</head>
<body>
    <div class="form-container">
        <h1>註冊</h1>
        <form id="register-form">
            <input type="text" name="username" placeholder="使用者名稱" required>
            <input type="email" name="email" placeholder="電子郵件" required>
            <input type="password" name="password" placeholder="密碼" required>
            <input type="text" name="full_name" placeholder="全名">
            <input type="text" name="address" placeholder="地址">
            <input type="tel" name="phone_number" placeholder="電話號碼">
            <button type="submit">註冊</button>
        </form>
        <div id="message"></div>
        <p>已經有帳號了？ <a href="login.html">點此登入</a></p>
    </div>

    <script src="js/modules/api.js"></script>
    <script src="js/modules/auth.js"></script>
</body>
</html>
